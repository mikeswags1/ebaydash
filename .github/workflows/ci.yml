name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # CI-only placeholders so Next.js can build without repo secrets.
          NEXTAUTH_SECRET: ci-build-placeholder-nextauth-secret-min-32-chars
          NEXTAUTH_URL: http://localhost:3000
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci_build_dummy

