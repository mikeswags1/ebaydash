  <path d="M178 283c47-45 105-80 174-104-44 44-76 91-96 141l-78-37Z" fill="#e0f7ff" opacity="0.92"/>
  <path d="M103 380h166" stroke="#7dd3fc" stroke-width="14" stroke-linecap="round" opacity="0.45"/>
  <path d="M138 412h96" stroke="#34d399" stroke-width="10" stroke-linecap="round" opacity="0.55"/>
