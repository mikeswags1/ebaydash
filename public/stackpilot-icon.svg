<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">StackPilot app icon</title>
  <desc id="desc">A dark rounded app icon with a cyan StackPilot flight mark.</desc>
  <defs>
    <linearGradient id="bg" x1="72" y1="44" x2="456" y2="492" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b2a42"/>
      <stop offset="0.46" stop-color="#071827"/>
      <stop offset="1" stop-color="#020712"/>
    </linearGradient>
    <linearGradient id="wing" x1="104" y1="136" x2="432" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7dd3fc"/>
